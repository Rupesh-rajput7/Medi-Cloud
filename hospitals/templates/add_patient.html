{% extends 'admin_nav.html' %}
{% load static %}
{% block content %}

{% if error == "no" %}
     <script>
	   alert('Record Saved Successfully');
       window.location = "{% url 'view_patient' %}";
     </script>
{% endif %}

{% if error == "yes" %}
     <script>
	    alert('Something went wrong, Try Again');
     </script>
{% endif %}

<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="table-card">
                <div class="mb-4 pb-2" style="border-bottom: 2px solid var(--primary-color)">
                    <h4 class="m-0 font-weight-bold">Add New Patient</h4>
                </div>

				<form method="post">
                    {% csrf_token %}
					<div class="row">
						<div class="col-md-6">
							<div class="form-group mb-3">
								<label class="font-weight-bold">Patient Name</label>
								<div class="input-group">
									<div class="input-group-prepend">
										<span class="input-group-text"><i class="fas fa-user"></i></span>
									</div>
									<input type="text" name="name" class="form-control" placeholder="Enter Patient Name" required>
								</div>
							</div>
						</div>

						<div class="col-md-6">
							<div class="form-group mb-3">
								<label class="font-weight-bold">Mobile Number</label>
								<div class="input-group">
									<div class="input-group-prepend">
										<span class="input-group-text"><i class="fas fa-phone"></i></span>
									</div>
									<input type="text" name="mobile" class="form-control" placeholder="Enter Ten Digit Mobile Number" required>
								</div>
							</div>
						</div>
					</div>

					<div class="form-group mb-3">
						<label class="font-weight-bold d-block">Gender</label>
						<div class="custom-control custom-radio custom-control-inline">
							<input type="radio" id="male" name="gender" value="Male" class="custom-control-input" required>
							<label class="custom-control-label" for="male">Male</label>
						</div>
						<div class="custom-control custom-radio custom-control-inline">
							<input type="radio" id="female" name="gender" value="Female" class="custom-control-input">
							<label class="custom-control-label" for="female">Female</label>
						</div>
					</div>

					<div class="form-group mb-4">
						<label class="font-weight-bold">Address</label>
						<textarea name="address" class="form-control" rows="3" placeholder="Enter Patient Address" required></textarea>
					</div>

					<div class="text-right">
						<button type="submit" class="btn btn-primary-modern px-5">
							<i class="fas fa-save mr-2"></i> Save Patient
						</button>
					</div>
				</form>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
