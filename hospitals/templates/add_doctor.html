{% extends 'admin_nav.html' %}
{% load static %}
{% block content %}

{% if error == "no" %}
     <script>
	   alert('Record Saved Successfully');
       window.location = "{% url 'view_doctor' %}";
     </script>
{% endif %}

{% if error == "yes" %}
     <script>
	    alert('Something went wrong, Try Again');
     </script>
{% endif %}

<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="table-card">
                <div class="mb-4 pb-2" style="border-bottom: 2px solid var(--primary-color)">
                    <h4 class="m-0 font-weight-bold">Add New Doctor</h4>
                </div>

				<form method="post">
                    {% csrf_token %}
					<div class="form-group mb-3">
						<label class="font-weight-bold">Doctor Name</label>
						<div class="input-group">
							<div class="input-group-prepend">
								<span class="input-group-text"><i class="fas fa-user-md"></i></span>
							</div>
							<input type="text" name="name" class="form-control" placeholder="Enter Doctor Name" required>
						</div>
					</div>

					<div class="form-group mb-3">
						<label class="font-weight-bold">Contact Number</label>
						<div class="input-group">
							<div class="input-group-prepend">
								<span class="input-group-text"><i class="fas fa-phone"></i></span>
							</div>
							<input type="text" name="mobile" class="form-control" placeholder="Enter Ten Digit Mobile Number" required>
						</div>
					</div>

					<div class="form-group mb-4">
						<label class="font-weight-bold">Specialization</label>
						<div class="input-group">
							<div class="input-group-prepend">
								<span class="input-group-text"><i class="fas fa-certificate"></i></span>
							</div>
							<input type="text" name="special" class="form-control" placeholder="Enter Doctor Specialization" required>
						</div>
					</div>

					<div class="text-right">
						<button type="submit" class="btn btn-primary-modern px-5">
							<i class="fas fa-save mr-2"></i> Save Doctor
						</button>
					</div>
				</form>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
