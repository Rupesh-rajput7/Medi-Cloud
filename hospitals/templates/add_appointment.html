{% extends 'admin_nav.html' %}
{% load static %}
{% block content %}

{% if error == "no" %}
     <script>
	   alert('Record Saved Successfully');
       window.location = "{% url 'view_appointment' %}";
     </script>
{% endif %}

{% if error == "yes" %}
     <script>
	    alert('Something went wrong, Try Again');
     </script>
{% endif %}

<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="table-card">
                <div class="mb-4 pb-2" style="border-bottom: 2px solid var(--primary-color)">
                    <h4 class="m-0 font-weight-bold">Add New Appointment</h4>
                </div>

				<form method="post">
                    {% csrf_token %}
					<div class="row">
						<div class="col-md-6">
							<div class="form-group mb-3">
								<label class="font-weight-bold">Doctor Name</label>
								<div class="input-group">
									<div class="input-group-prepend">
										<span class="input-group-text"><i class="fas fa-user-md"></i></span>
									</div>
									<select name="doctor" class="form-control" required>
										<option value="" disabled selected>Select Doctor</option>
										{% for i in doctor %}
										<option value="{{i.name}}">{{i.name}} [{{i.id}}]</option>
										{% endfor %}
									</select>
								</div>
							</div>
						</div>

						<div class="col-md-6">
							<div class="form-group mb-3">
								<label class="font-weight-bold">Patient Name</label>
								<div class="input-group">
									<div class="input-group-prepend">
										<span class="input-group-text"><i class="fas fa-user-injured"></i></span>
									</div>
									<select name="patient" class="form-control" required>
										<option value="" disabled selected>Select Patient</option>
										{% for i in patient %}
										<option value="{{i.name}}">{{i.name}} [{{i.id}}]</option>
										{% endfor %}
									</select>
								</div>
							</div>
						</div>
					</div>

					<div class="row">
						<div class="col-md-6">
							<div class="form-group mb-3">
								<label class="font-weight-bold">Date</label>
								<div class="input-group">
									<div class="input-group-prepend">
										<span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
									</div>
									<input type="date" name="date" class="form-control" required>
								</div>
							</div>
						</div>

						<div class="col-md-6">
							<div class="form-group mb-4">
								<label class="font-weight-bold">Time</label>
								<div class="input-group">
									<div class="input-group-prepend">
										<span class="input-group-text"><i class="fas fa-clock"></i></span>
									</div>
									<input type="time" name="time" class="form-control" required>
								</div>
							</div>
						</div>
					</div>

					<div class="text-right">
						<button type="submit" class="btn btn-primary-modern px-5">
							<i class="fas fa-save mr-2"></i> Save Appointment
						</button>
					</div>
				</form>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
