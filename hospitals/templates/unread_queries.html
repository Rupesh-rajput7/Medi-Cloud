{% extends 'admin_nav.html' %}
{% load static %}
{% block content %}

<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="table-card">
                <div class="mb-4 pb-2" style="border-bottom: 2px solid var(--primary-color)">
                    <h4 class="m-0 font-weight-bold">Unread Queries</h4>
                </div>

                <div class="table-responsive">
                    <table id="example" class="table table-hover" style="width:100%">
                        <thead class="thead-light">
                            <tr>
                                <th>S.No</th>
                                <th>Name</th>
                                <th>Email ID</th>
                                <th>Contact Number</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for i in contact %}
                            <tr>
                                <td>{{forloop.counter}}</td>
                                <td>{{i.name}}</td>
                                <td>{{i.email}}</td>
                                <td>{{i.contact}}</td>
                                <td>
                                    <a href="{% url 'view_queries' i.id %}" class="btn btn-outline-primary btn-sm">
                                        <i class="fas fa-eye"></i> View Details
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
